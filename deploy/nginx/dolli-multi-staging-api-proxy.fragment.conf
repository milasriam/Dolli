# Paste INSIDE the `server { ... server_name staging.dolli.space; ... }` block,
# AFTER `index index.html;` and BEFORE `location / { try_files ... }`.
#
# Staging SPA then calls https://staging.dolli.space/api/... (same origin);
# nginx forwards to dolli-backend-staging (default 127.0.0.1:8001).

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 20m;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
