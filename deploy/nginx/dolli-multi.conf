# Production + staging nginx for Dolli on one VPS.
# Install: sudo cp deploy/nginx/dolli-multi.conf /etc/nginx/sites-available/dolli-multi.conf
#          sudo ln -sf /etc/nginx/sites-available/dolli-multi.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS: certbot --nginx -d dolli.space -d www.dolli.space -d api.dolli.space (prod line)

server {
    listen 80;
    server_name dolli.space www.dolli.space api.dolli.space;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name staging.dolli.space api-staging.dolli.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dolli.space www.dolli.space;

    ssl_certificate /etc/letsencrypt/live/dolli.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dolli.space/privkey.pem;

    root /opt/dolli/www/prod;
    index index.html;

    # Same-origin /api/ → prod backend (avoids cross-subdomain CORS/TLS quirks in browsers).
    # Host must stay api.dolli.space so OAuth redirect_uri and absolute links match Google config.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host api.dolli.space;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 128m;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host api.dolli.space;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name staging.dolli.space;

    ssl_certificate /etc/letsencrypt/live/staging.dolli.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.dolli.space/privkey.pem;

    root /opt/dolli/www/staging;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 128m;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name api.dolli.space;

    ssl_certificate /etc/letsencrypt/live/dolli.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dolli.space/privkey.pem;

    client_max_body_size 128m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 443 ssl http2;
    server_name api-staging.dolli.space;

    ssl_certificate /etc/letsencrypt/live/staging.dolli.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.dolli.space/privkey.pem;

    client_max_body_size 128m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}
